configs:
  det: configs/config_detection.yaml
  kp: configs/config_keypoints.yaml
  seg: configs/config_segmentation.yaml

paths:
  processed_ds_path: data/processed

evaluation:
  split: test
  seed: 42
  max_samples:
  crop_pad_ratio: 0.08
  acc_tolerance: 0.05
  metrics:
    - reading_mae
    - reading_acc@5%
    - kpt_error
    - kpt_error_px
    - segmentation_iou
    - needle_angle_mae_deg
