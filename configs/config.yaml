dataset:
  name: synthetic-analog-gauges

paths:
  raw_ds_path: data/raw/synthetic-analog-gauges
  processed_ds_path: data/processed

  images_path: images

  train_inst_coco: annotations/instances_train.json
  val_inst_coco: annotations/instances_val.json
  test_inst_coco: annotations/instances_test.json

  train_kpts_coco: annotations/instances_train.json
  val_kpts_coco: annotations/instances_val.json
  test_kpts_coco: annotations/instances_test.json

  train_inst_json: data/processed/synthetic-analog-gauges_reg/train_regression.jsonl
  val_inst_json: data/processed/synthetic-analog-gauges_reg/val_regression.jsonl
  test_inst_json: data/processed/synthetic-analog-gauges_reg/test_regression.jsonl

  train_reg_output_json: data/processed/synthetic-analog-gauges_reg/train_regression.jsonl
  val_reg_output_json: data/processed/synthetic-analog-gauges_reg/val_regression.jsonl
  test_reg_output_json: data/processed/synthetic-analog-gauges_reg/test_regression.jsonl

  train_det_kp_output_json: data/processed/synthetic-analog-gauges_det_kp/train_det_kp.jsonl
  val_det_kp_output_json: data/processed/synthetic-analog-gauges_det_kp/val_det_kp.jsonl
  test_det_kp_output_json: data/processed/synthetic-analog-gauges_det_kp/test_det_kp.jsonl

  weights_dir_reg: models/weights/reg/synthetic-analog-gauges
  weights_dir_det_kp: models/weights/det_kp/synthetic-analog-gauges

  yolo_data_yaml: configs/synthgauge_yolo_data.yaml
  yolo_weights_dir: models/weights/det_yolov8n/synthetic-analog-gauges

regression_target:
  category_name: gauge
  value_key: reading_normalized

keypoints_target:
  category_name: gauge
  names:
    - center
    - needle_tip
    - scale_start
    - scale_end
  num_keypoints: 4
  format: coco_xyv

detector_target:
  category_name: gauge
  num_classes: 1

transforms_reg:
  img_size: 256
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

  train:
    hflip_p: 0.0
    color_jitter_p: 0.3
    color_jitter: [0.2, 0.2, 0.2, 0.05]
    random_affine_p: 0.3
    degrees: 7
    translate: 0.02
    scale: [0.95, 1.05]
    blur_p: 0.2

model:
  backbone: resnet18
  pretrained: true
  dropout: 0.1

training_reg:
  device: cuda
  epochs: 50
  batch_size: 32
  num_workers: 4
  lr: 3e-4
  weight_decay: 1e-4
  optimizer: adamw
  amp: true
  seed: 42

  loss: mse
  best_metric: mae
  tol: 0.02
  log_every: 50

transforms_det_kp:
  backend: albumentations
  img_size: 640
  bbox_format: pascal_voc
  clip: true
  min_visibility: 0.0

  train:
    photometric_p: 0.7
    rotate_limit: 3
    scale_limit: 0.05
    translate_limit: 0.02
    blur_p: 0.2
    jpeg_p: 0.2

training_det_kp:
  device: cuda
  epochs: 100
  batch_size: 16
  num_workers: 4
  lr: 1e-3
  weight_decay: 1e-4
  optimizer: adamw
  scheduler: cosine
  amp: true
  seed: 42
  pretrained_coco: true

  best_metric: kpt_mae
  pck_thr: 0.05
  score_thr: 0.3
  log_every: 50

detection_experiment:
  framework: ultralytics
  model: yolov8n
  pretrained: coco
  input_size: 640
  training:
    epochs: 100
    batch_size: 16
    optimizer: AdamW
    lr0: 1.0e-3
    lr_scheduler: cosine
  evaluation:
    metrics:
      - "precision"
      - "recall"
      - "mAP@0.5"
      - "mAP@0.5:0.95"

reading_experiment:
  model: resnet18_regression
  target: reading_normalized
  training:
    epochs: 50
    optimizer: AdamW
    loss: MSE
  evaluation:
    metrics:
      - mae
      - drr@0.02
